version: '3.9'

# ============================================================
# FleetOS — Full Stack Docker Compose
# Usage: docker compose up -d
# ============================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fleetos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: traccar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-PXJbIJ59qcPDvuXHOX3u}
      POSTGRES_DB: traccar
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traccar"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Traccar Backend ─────────────────────────────────────
  traccar:
    image: traccar/traccar:latest
    container_name: fleetos-traccar
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Web API
      - "8082:8082"
      # GPS device ports (add more as needed)
      - "5023:5023"    # GT06 / Concox
      - "5027:5027"    # Teltonika
      - "5004:5004"    # Queclink GL200
      - "5036:5036"    # Sinotrack
      - "5055:5055"    # OsmAnd / Traccar Client
      - "5020:5020"    # Meitrack
      - "10000:10000"  # Generic NMEA
    volumes:
      - ./config/traccar.xml:/opt/traccar/conf/traccar.xml:ro
      - traccar_logs:/opt/traccar/logs
      - traccar_data:/opt/traccar/data
    environment:
      - TZ=UTC

  # ── FleetOS Web UI ──────────────────────────────────────
  fleetos-web:
    image: nginx:alpine
    container_name: fleetos-web
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - traccar

  # ── pgAdmin (database management) ──────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fleetos-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fleetos.io
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  traccar_logs:
  traccar_data:
